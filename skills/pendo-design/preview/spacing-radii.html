<!doctype html>
<html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="_preview.css">
<style>
  .r { display:flex; flex-direction:column; align-items:center; gap:8px; flex:1; }
  .shape { width:80px; height:80px; background:#FF4876; }
  .name { font-family:var(--font-sans); font-weight:600; font-size:12px; }
  .val { font-family:var(--font-mono); font-size:10px; color:#7C7C79; }
</style></head>
<body>
<div class="card">
  <div class="label">Corner radii · never sharp on content cards</div>
  <div class="row" style="gap:12px">
    <div class="r"><div class="shape" style="border-radius:4px"></div><div class="name">sm</div><div class="val">4px · inputs</div></div>
    <div class="r"><div class="shape" style="border-radius:8px"></div><div class="name">md</div><div class="val">8px · buttons</div></div>
    <div class="r"><div class="shape" style="border-radius:12px"></div><div class="name">lg</div><div class="val">12px · cards</div></div>
    <div class="r"><div class="shape" style="border-radius:16px"></div><div class="name">xl</div><div class="val">16px · wrappers</div></div>
    <div class="r"><div class="shape" style="border-radius:999px"></div><div class="name">pill</div><div class="val">999 · badges</div></div>
  </div>
</div>
</body></html>
