<!doctype html>
<html><head><meta charset="utf-8"><title>Shadows</title>
<link rel="stylesheet" href="_preview.css">
<style>
  .grid2 { display:grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }
  .box { height: 74px; background: #fff; border-radius: 10px; display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:10px; color:#7C7C79; }
  .xs { box-shadow: 0 1px 2px rgba(24,24,24,.06); }
  .sm { box-shadow: 0 2px 6px rgba(24,24,24,.08); }
  .md { box-shadow: 0 8px 24px rgba(24,24,24,.10); }
  .lg { box-shadow: 0 24px 60px rgba(24,24,24,.16); }
  .glow { box-shadow: 0 0 0 4px rgba(255,72,118,.28); border: 1.5px solid #FF4876; }
</style></head>
<body>
<div class="card" style="padding-bottom:44px">
  <div class="label">Shadow system · flat-forward, restrained</div>
  <div class="grid2">
    <div class="box xs">xs</div>
    <div class="box sm">sm</div>
    <div class="box md">md</div>
    <div class="box lg">lg</div>
    <div class="box glow">pink focus</div>
  </div>
</div>
</body></html>
