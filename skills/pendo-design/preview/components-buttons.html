<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="_preview.css">
<style>
  .btn { font-family:Inter; font-weight:600; font-size:14px; padding:10px 18px; border-radius:8px; border:none; cursor:pointer; }
  .btn.primary { background:#FF4876; color:#fff; }
  .btn.primary:hover { background:#E53B66; }
  .btn.secondary { background:transparent; color:#181818; border:1.5px solid #C7C8C2; }
  .btn.secondary:hover { border-color:#FF4876; color:#FF4876; }
  .btn.ghost { background:transparent; color:#181818; }
  .btn.dark { background:#FF4876; color:#fff; }
  .btn.sm { padding:6px 12px; font-size:12px; }
  .btn.lg { padding:14px 22px; font-size:16px; }
  .group { display:flex; gap:10px; align-items:center; }
  .dk { background:#000; padding:14px 16px; border-radius:10px; display:flex; gap:10px; }
  .dk .btn.secondary { color:#fff; border-color:#565655; }
</style></head>
<body>
<div class="card">
  <div class="label">Buttons · primary always pink, sentence case</div>
  <div class="group">
    <button class="btn primary">Get a demo</button>
    <button class="btn secondary">See features</button>
    <button class="btn ghost">Learn more</button>
  </div>
  <div class="group">
    <button class="btn primary sm">Save</button>
    <button class="btn primary">Publish guide</button>
    <button class="btn primary lg">Start free trial →</button>
  </div>
  <div class="dk">
    <button class="btn primary">Get a demo</button>
    <button class="btn secondary">See features</button>
  </div>
</div>
</body></html>
