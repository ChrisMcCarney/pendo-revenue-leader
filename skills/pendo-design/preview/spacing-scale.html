<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="_preview.css">
<style>
  .s { display:flex; align-items:center; gap:14px; padding:4px 0; }
  .bar { background:#FF4876; height:14px; border-radius:3px; }
  .t { font-family:var(--font-mono); font-size:11px; color:#565655; width: 160px; }
</style></head>
<body>
<div class="card">
  <div class="label">Spacing · 8px base</div>
  <div class="s"><div class="t">--space-1 · 4px</div><div class="bar" style="width:4px"></div></div>
  <div class="s"><div class="t">--space-2 · 8px</div><div class="bar" style="width:8px"></div></div>
  <div class="s"><div class="t">--space-3 · 12px</div><div class="bar" style="width:12px"></div></div>
  <div class="s"><div class="t">--space-4 · 16px</div><div class="bar" style="width:16px"></div></div>
  <div class="s"><div class="t">--space-5 · 24px</div><div class="bar" style="width:24px"></div></div>
  <div class="s"><div class="t">--space-6 · 32px</div><div class="bar" style="width:32px"></div></div>
  <div class="s"><div class="t">--space-7 · 48px</div><div class="bar" style="width:48px"></div></div>
  <div class="s"><div class="t">--space-8 · 64px</div><div class="bar" style="width:64px"></div></div>
  <div class="s"><div class="t">--space-9 · 96px</div><div class="bar" style="width:96px"></div></div>
  <div class="s"><div class="t">--space-10 · 128px</div><div class="bar" style="width:128px"></div></div>
</div>
</body></html>
