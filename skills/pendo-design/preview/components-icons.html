<!doctype html>

<link rel="stylesheet" href="_preview.css">
<style>
  .grid-ic { display:grid; grid-template-columns: repeat(12, 1fr); gap: 8px 8px; }
  .ic { display:flex; align-items:center; justify-content:center; padding:10px 4px; border-radius:6px; }
  .ic svg { width:20px; height:20px; stroke-width:1.75; }

  .surface { border-radius:10px; padding:14px; }
  .surface.lt { background:#fff; border:1px solid #C7C8C2; color:#181818; }
  .surface.dk { background:#000; color:#EDEEE7; }
  .surface.dk .ic svg { color:#EDEEE7; }
  .surface.lt .ic svg { color:#181818; }

  /* nav row: fewer, larger */
  .navrow { display:flex; gap:14px; flex-wrap:wrap; padding:12px 14px; border:1px solid #C7C8C2; border-radius:10px; background:#fff; }
  .navrow .ic svg { width:24px; height:24px; }

  pre.snip { font-family: var(--font-mono); font-size:11px; line-height:1.55; background:#181818; color:#EDEEE7; padding:12px 14px; border-radius:8px; margin:0; overflow:auto; }
  pre.snip .k { color:#FF9ED7; }
  pre.snip .s { color:#C7C8C2; }

  .sub { font-family: var(--font-sans); font-size:11px; color: var(--text-secondary); font-weight:600; letter-spacing:0.06em; text-transform:uppercase; margin: 6px 0 2px; }
</style>

<pre class="snip"><span class="s">&lt;!-- HTML --&gt;</span>

&lt;<span class="k">script src</span>=<span class="s">"https://unpkg.com/lucide@latest"</span>&gt;&lt;/script&gt;

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
  function toPascal(kebab) {
    return kebab.split('-').map(s => s[0].toUpperCase() + s.slice(1)).join('');
  }
  document.querySelectorAll('.ic').forEach(el => {
    const name = el.dataset.name;
    const key = toPascal(name);
    const icon = lucide.icons[key];
    if (icon) {
      const node = lucide.createElement(icon);
      el.appendChild(node);
    } else {
      // Fallback: empty placeholder so layout doesn't shift
      el.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="4" width="16" height="16" rx="2" opacity="0.3"/></svg>';
      el.title = 'missing: ' + name;
    }
  });
</script>
